<!DOCTYPE html>
<html>
<head>
<title>PNR Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0f2027;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: 50px auto;
  background: #1e2a38;
  padding: 20px;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00c6ff;
  color: white;
}

.card {
  background: #0f1a24;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚆 PNR Status</h2>

  <input type="text" id="pnr" placeholder="Enter PNR">
  <button onclick="checkPNR()">Check</button>

  <div id="result"></div>
</div>

<script>
function checkPNR() {
  let pnr = document.getElementById("pnr").value;
  let result = document.getElementById("result");

  result.innerHTML = "Checking...";

  fetch("https://pnr-api-0hf4.onrender.com/pnr-status?pnr=" + pnr)
    .then(res => res.json())
    .then(data => {

      console.log(data);

      let html = `
        <div class="card">Train: ${data.trainName}</div>
        <div class="card">Number: ${data.trainNum}</div>
        <div class="card">From: ${data.stationFrom}</div>
        <div class="card">To: ${data.stationTo}</div>
      `;

      // passenger list
      if (data.passengerList) {
        data.passengerList.forEach(p => {
          html += `
            <div class="card">
              Passenger ${p.serialNo}: ${p.seatStts}
            </div>
          `;
        });
      }

      result.innerHTML = html;
    })
    .catch(() => {
      result.innerHTML = "❌ Error";
    });
}
</script>

</body>
</html>
