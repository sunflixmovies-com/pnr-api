<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PNR Status Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

.container {
  max-width: 420px;
  margin: 60px auto;
  padding: 20px;
  background: #1e2a38;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

h2 {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #00c6ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0072ff;
}

.loader {
  display: none;
  margin-top: 10px;
}

.result {
  margin-top: 20px;
  text-align: left;
}

.card {
  background: #0f1a24;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

.green { color: #00ff99; }
.red { color: #ff4d4d; }
</style>
</head>

<body>

<div class="container">
  <h2>🚆 PNR Status Checker</h2>

  <input type="text" id="pnr" placeholder="Enter 10-digit PNR">

  <button onclick="checkPNR()">Check Status</button>

  <div id="loader" class="loader">🔄 Checking PNR...</div>

  <div id="result" class="result"></div>
</div>

<script>
function checkPNR() {
  let pnr = document.getElementById("pnr").value.trim();
  let result = document.getElementById("result");
  let loader = document.getElementById("loader");

  if (!pnr || pnr.length < 10) {
    alert("Enter valid PNR");
    return;
  }

  loader.style.display = "block";
  result.innerHTML = "";

  fetch("https://pnr-api-0hf4.onrender.com/pnr-status?pnr=" + pnr + "&t=" + Date.now())
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data);

      loader.style.display = "none";

      // 🔥 IMPORTANT FIX
      let d = data.data || data;

      if (!d || !d.trainName) {
        result.innerHTML = "❌ No data found";
        return;
      }

      let html = `
        <div class="card">🚆 Train: ${d.trainName}</div>
        <div class="card">🔢 Number: ${d.trainNum}</div>
        <div class="card">📍 From: ${d.stationFrom}</div>
        <div class="card">📍 To: ${d.stationTo}</div>
      `;

      // 🔥 CORRECT passenger fields
      if (d.passengerList && Array.isArray(d.passengerList)) {
        d.passengerList.forEach(p => {
          html += `
            <div class="card">
              Passenger ${p.passengerSerialNumber}: ${p.currentStatus}
            </div>
          `;
        });
      }

      result.innerHTML = html;
    })
    .catch(err => {
      loader.style.display = "none";
      result.innerHTML = "❌ Error loading data";
    });
}
</script>

</body>
</html>
