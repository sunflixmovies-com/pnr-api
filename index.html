<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PNR Status Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f2027;
  color: white;
}

.container {
  max-width: 400px;
  margin: 60px auto;
  padding: 20px;
  background: #1e2a38;
  border-radius: 10px;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00c6ff;
  color: white;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  text-align: left;
}

.card {
  background: #0f1a24;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚆 PNR Status</h2>

  <input type="text" id="pnr" placeholder="Enter PNR">

  <button onclick="checkPNR()">Check</button>

  <div id="loader" style="display:none;">Checking...</div>

  <div id="result" class="result"></div>
</div>

<script>
function checkPNR() {
  let pnr = document.getElementById("pnr").value;
  let loader = document.getElementById("loader");
  let result = document.getElementById("result");

  loader.style.display = "block";
  result.innerHTML = "";

  fetch("https://pnr-api-0hf4.onrender.com/pnr-status?pnr=" + pnr)
    .then(res => res.json())
    .then(data => {

      console.log("FULL DATA:", data); // 🔥 DEBUG

      loader.style.display = "none";

      // 👉 Handle all formats
      let d = data.data || data;

      // 👉 अगर data ही नहीं है
      if (!d || typeof d !== "object") {
        result.innerHTML = "❌ No data found";
        return;
      }

      // 👉 safe values
      let train = d.trainName || "N/A";
      let num = d.trainNum || "N/A";
      let from = d.stationFrom || "N/A";
      let to = d.stationTo || "N/A";

      let html = `
        <div class="card">Train: ${train}</div>
        <div class="card">Number: ${num}</div>
        <div class="card">From: ${from}</div>
        <div class="card">To: ${to}</div>
      `;

      // 👉 Passenger list safe
      if (d.passengerList && Array.isArray(d.passengerList)) {
        d.passengerList.forEach(p => {
          html += `
            <div class="card">
              Passenger ${p.passengerSerialNumber}: ${p.currentStatus}
            </div>
          `;
        });
      }

      result.innerHTML = html;
    })
    .catch(err => {
      loader.style.display = "none";
      result.innerHTML = "❌ Error loading data";
    });
}
</script>

</body>
</html>
